name: Governance Check

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8am UTC
  push:
    branches: [main]
    paths:
      - config.yaml
      - .github/workflows/go.yml
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "evaluate"
        type: choice
        options:
          - evaluate
          - apply
      repo:
        description: "Target a single repo (blank = all)"
        required: false
        type: string

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o governance .

      - name: Run governance check
        run: |
          ARGS="-config config.yaml -output reports/compliance.json"
          MODE="${{ github.event.inputs.mode }}"
          ARGS="$ARGS -mode ${MODE:-evaluate}"
          if [ -n "${{ github.event.inputs.repo }}" ]; then
            ARGS="$ARGS -repo ${{ github.event.inputs.repo }}"
          fi
          ./governance $ARGS
        env:
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: reports/compliance.json
          retention-days: 90
