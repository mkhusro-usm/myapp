github-app:
  app-id: 3378260
  installation-id: 123964365
  # Private key is injected via GH_APP_PRIVATE_KEY env var (from GitHub Actions secrets).
  # Optionally set private-key-path for local dev with a gitignored .pem file.
  private-key-path: ./private-key.pem

org: mkhusro-usm

concurrency: 10

rules:
  repo-rulesets:
    enabled: true
    scope: repo
    settings:
      rulesets:
        - name: "{default_branch}"
          target: branch
          enforcement: active
          bypass-actors:
            - actor-id: 5
              actor-type: "RepositoryRole"
              bypass-mode: "always"
          conditions:
            ref-name:
              include:
                - "~DEFAULT_BRANCH"
              exclude: []
          rules:
            creation: true
            update: false
            deletion: true
            require-linear-history: false
            # require-deployments-to-succeed: (omitted = not managed)
            require-signed-commits: false

            pull-request:
              dismiss-stale-approvals-on-push: false
              require-code-owner-review: true
              require-most-recent-push-approval: false
              required-approvals: 1
              require-conversation-resolution: true
              required-reviewers: []
              allowed-merge-methods:
                - "squash"

            required-status-checks:
              require-branches-to-be-up-to-date: false
              do-not-require-status-checks-on-creation: false
              required-status-checks: []

            block-force-pushes: true

            code-scanning:
              code-scanning-tools:
                - tool: "CodeQL"
                  alerts-threshold: "errors"
                  security-alerts-threshold: "high_or_higher"

            copilot-code-review:
              review-on-push: false
              review-draft-pull-requests: false

  codeowners:
    enabled: false
    scope: repo
    settings:
      entries:
        - pattern: ".github/CODEOWNERS"
          owners:
            - "@mkhusro-usm"
        - pattern: ".github/workflows/**"
          owners:
            - "@mkhusro-usm"

  repo-settings:
    enabled: false
    scope: repo
    settings:
      # Merge strategies
      allow-merge-commit: true
      allow-squash-merge: true
      allow-rebase-merge: false

      # Merge commit — valid combos:
      #   PR_TITLE + PR_BODY | PR_TITLE + BLANK | MERGE_MESSAGE + PR_TITLE
      merge-commit-title: MERGE_MESSAGE
      merge-commit-message: PR_TITLE

      # Squash merge commit — valid combos:
      #   PR_TITLE + PR_BODY | PR_TITLE + BLANK | PR_TITLE + COMMIT_MESSAGES | COMMIT_OR_PR_TITLE + COMMIT_MESSAGES
      squash-merge-commit-title: PR_TITLE
      squash-merge-commit-message: COMMIT_MESSAGES

      # PR behavior
      allow-update-branch: false
      allow-auto-merge: true
      delete-branch-on-merge: true
