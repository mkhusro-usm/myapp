github-app:
  app-id: 3378260
  installation-id: 123964365
  # Private key is injected via GH_APP_PRIVATE_KEY env var (from GitHub Actions secrets).
  # Optionally set private-key-path for local dev with a gitignored .pem file.
  # private-key-path: ./private-key.pem

org: mkhusro-usm

concurrency: 10

rules:
  branch-protection:
    enabled: true
    scope: repo
    settings:
      # Pull request reviews
      require-pull-request-reviews: true
      required-approving-review-count: 1
      dismiss-stale-reviews: true
      require-code-owner-reviews: true
      require-last-push-approval: true
      # Actor-based settings require an organization repository
      # bypass-pull-request-actors:
      #   users:
      #     - mkhusro-usm
      #   teams: []
      # review-dismissal-actors:
      #   users:
      #     - mkhusro-usm
      #   teams: []

      # Status checks
      require-status-checks: true
      require-up-to-date-branch: true
      required-status-check-contexts:
        - ci/build
        - ci/test

      # Deployments
      require-deployments: true
      required-deployment-environments: []

      # Admin and merge rules
      enforce-admins: true
      require-linear-history: true
      require-signed-commits: true
      require-conversation-resolution: true

      # Branch restrictions
      allow-force-pushes: true
      allow-deletions: true
      block-creations: true
      lock-branch: true
      allow-fork-syncing: true
      # push-restriction-actors:
      #   users:
      #     - mkhusro-usm
      #   teams: []

  codeowners:
    enabled: true
    scope: repo
    settings:
      entries:
        - pattern: "*"
          owners:
            - "@mkhusro-usm"

  repo-settings:
    enabled: true
    scope: repo
    settings:
      # Merge strategies
      allow-merge-commit: true
      allow-squash-merge: true
      allow-rebase-merge: true

      # Default commit messages
      merge-commit-title: PR_TITLE            # PR_TITLE or MERGE_MESSAGE
      merge-commit-message: PR_BODY           # PR_BODY, PR_TITLE, or BLANK
      squash-merge-commit-title: PR_TITLE     # PR_TITLE or COMMIT_OR_PR_TITLE
      squash-merge-commit-message: PR_BODY    # PR_BODY, COMMIT_MESSAGES, or BLANK

      # PR behavior
      allow-update-branch: true
      allow-auto-merge: true
      delete-branch-on-merge: true
