github_app:
  app_id: 12345
  installation_id: 67890
  # Private key is injected via GITHUB_APP_PRIVATE_KEY env var (from GitHub Actions secrets).
  # Optionally set private_key_path for local dev with a gitignored .pem file.
  # private_key_path: ./private-key.pem

org: my-org

# "evaluate" = audit only (report drift), "apply" = enforce (fix drift)
mode: evaluate

concurrency: 10

output:
  console: true
  json: reports/compliance.json

rules:
  branch_protection:
    enabled: true
    settings:
      require_pull_request_reviews: true
      required_approving_review_count: 1
      require_status_checks: true
      require_up_to_date_branch: true
      enforce_admins: true
      require_linear_history: false
      allow_force_pushes: false
      allow_deletions: false
