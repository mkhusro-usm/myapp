github-app:
  app-id: 3378260
  installation-id: 123964365
  # Private key is injected via GH_APP_PRIVATE_KEY env var (from GitHub Actions secrets).
  # Optionally set private-key-path for local dev with a gitignored .pem file.
  # private-key-path: ./private-key.pem

org: mkhusro-usm

concurrency: 10

rules:
  repo-rulesets:
    enabled: true
    scope: repo
    settings:
      rulesets:
        - name: "default-branch-protection"
          target: branch
          enforcement: active
          conditions:
            ref-name:
              include:
                - "~DEFAULT_BRANCH"
              exclude: []
          rules:
            # Restrict rules
            creation: true
            update: true
            deletion: true

            # Pull request reviews
            pull-request:
              dismiss-stale-reviews-on-push: true
              require-code-owner-review: true
              require-last-push-approval: true
              required-approving-review-count: 1
              required-review-thread-resolution: true

            # Status checks
            required-status-checks:
              strict-required-status-checks-policy: true
              required-status-checks:
                - context: "ci/build"
                - context: "ci/test"

            # Deployments (uncomment when environments are configured)
            # required-deployments:
            #   required-deployment-environments:
            #     - "production"

            # Code scanning
            code-scanning:
              code-scanning-tools:
                - tool: "CodeQL"
                  alerts-threshold: "errors"
                  security-alerts-threshold: "critical"

            # Copilot code review
            copilot-code-review:
              review-on-push: true
              review-draft-pull-requests: false

            # Branch rules
            required-linear-history: true
            required-signatures: true
            non-fast-forward: true

  codeowners:
    enabled: false
    scope: repo
    settings:
      entries:
        - pattern: "*"
          owners:
            - "@mkhusro-usm"

  repo-settings:
    enabled: false
    scope: repo
    settings:
      # Merge strategies
      allow-merge-commit: true
      allow-squash-merge: true
      allow-rebase-merge: true

      # Default commit messages
      merge-commit-title: PR_TITLE            # PR_TITLE or MERGE_MESSAGE
      merge-commit-message: PR_BODY           # PR_BODY, PR_TITLE, or BLANK
      squash-merge-commit-title: PR_TITLE     # PR_TITLE or COMMIT_OR_PR_TITLE
      squash-merge-commit-message: PR_BODY    # PR_BODY, COMMIT_MESSAGES, or BLANK

      # PR behavior
      allow-update-branch: true
      allow-auto-merge: true
      delete-branch-on-merge: true
